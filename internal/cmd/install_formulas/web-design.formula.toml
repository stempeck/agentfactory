[[steps]]
id = "finalize-prototype"
title = "Finalize the agreed-upon prototype"
needs = ["check-consensus-5"]
description = """
**Entry criteria:** Design direction agreed (or max iterations reached).

**Note:** This step may be reached early if consensus was reached before iteration 5.
It depends on check-consensus-5 but can be unblocked by earlier consensus checks marking
later steps as 'skipped'.

**Actions:**
1. Determine which prototype version to finalize: the latest version that received
   approval, or v5 if max iterations were reached.

2. Create the final prototype in `{{output_dir}}/final/`:
   ```
   final/
   ├── index.html
   ├── styles/
   │   ├── variables.css   # Design tokens from the chosen direction (color, type, spacing)
   │   └── main.css
   ├── screens/[screen].html
   ├── components/[component].html
   └── assets/[placeholder images/icons]
   ```
   Tokens in variables.css MUST match the chosen direction's token system from
   design-plan.md (the single source of truth for color and type).

3. Create **design-decisions.md**:
   ```markdown
   # Web UI Design Decisions

   ## Subject & Single Job
   [from the Problem Brief]

   ## Chosen Design Direction
   [which exploration/blend won, and why]

   ## Token System (final)
   - Palette: [4-6 named hex]
   - Type: [display / body / utility faces + scale]
   - Layout: [concept]
   - Signature element: [the one memorable thing]
   - Aesthetic risk taken: [what and why it works]

   ## Iterations Summary
   - Total iterations: [N]
   - Consensus reached: Iteration [X] / Max iterations reached

   ## Key Decisions
   | Decision | Options Considered | Chosen | Rationale (user feedback) |
   |----------|-------------------|--------|---------------------------|

   ## Screen Inventory
   | Screen | File | Purpose |
   |--------|------|---------|

   ## Component Library
   | Component | File | Usage |
   |-----------|------|-------|

   ## User Feedback History
   ### Iteration 1 ... ### Iteration N

   ## Future Improvements
   [deferred feedback or enhancement ideas]

   ## Traceability to Requirements
   | Requirement (from ui-requirements.md) | Screen(s) | Components |
   |---------------------------------------|-----------|------------|
   ```

4. Create **prototype-guide.md** (how to open, the user flows, implementation notes:
   CSS variables in variables.css, component patterns in components/).

5. Commit, push, and notify:
   ```bash
   git add {{output_dir}}/
   git commit -m "feat: finalize web UI prototype

   Generated by web-design formula.
   - Source: {{source}}
   - Iterations: [N]
   - Screens: [count]  Components: [count]

   Open {{output_dir}}/final/index.html to view."
   git push origin $(git branch --show-current)

   REMOTE_URL=$(git remote get-url origin | sed 's/\\.git$//')
   BRANCH=$(git branch --show-current)
   FINAL_URL="${REMOTE_URL}/tree/${BRANCH}/{{output_dir}}/final"

   af mail send manager/ -s "COMPLETE: Web UI Prototype Finalized" -m "
   Web design prototype finalized and pushed!

   ## Access
   - Branch: ${BRANCH}
   - Final prototype: ${FINAL_URL}
   - Design decisions: {{output_dir}}/design-decisions.md
   - Prototype guide: {{output_dir}}/prototype-guide.md

   Open {{output_dir}}/final/index.html to view. Ready for implementation.
   "
   ```

6. Create a completion bead:
   ```bash
   af bead create --type=task \\
     --title="Web UI Prototype: [feature name]" \\
     -d "Interactive HTML prototype from {{source}}.

   ## Files
   - Prototype: {{output_dir}}/final/index.html
   - Decisions: {{output_dir}}/design-decisions.md
   - Guide: {{output_dir}}/prototype-guide.md

   ## Summary
   [Iteration count and key decisions]"
   ```

**Exit criteria:**
- Final prototype created and polished; tokens match the chosen direction
- design-decisions.md and prototype-guide.md created
- All artifacts committed and pushed; completion bead created
"""

[[steps]]
id = "generate-contract"
title = "Generate machine-readable design contract"
needs = ["finalize-prototype"]
description = """
**Entry criteria:** Finalized prototype exists in `{{output_dir}}/final/`.

Generate a design-contract.yaml from the finalized prototype — the machine-readable
bridge between the visual design (for humans) and the implementation verification
system (for quality gates).

**Actions:**

1. Parse all screen HTML files in `{{output_dir}}/final/screens/`:
   - Extract elements with accessible roles (form, button, textbox, heading, alert, etc.)
   - Extract aria-labels and accessible names
   - Identify ViewModel bindings from data attributes and naming conventions
   - Map requirements to screens using the traceability table in design-decisions.md

2. For each interactive element, record: `id`, `accessible.role`, `accessible.name`,
   `purpose`, `required` (default true), and `viewmodel` (the property/method it binds to).

3. **Accessibility requirement:** every interactive element MUST have an appropriate
   ARIA role (explicit or implicit) and an accessible name. If an element in the
   prototype lacks these, ADD them to the prototype HTML before generating the contract.

4. Generate `{{output_dir}}/final/design-contract.yaml`:
   ```yaml
   version: 1
   feature: "[Feature Name]"
   generated_from: "{{source}}"
   generated_at: "[ISO 8601 timestamp]"
   screens:
     - id: screen-identifier
       prototype: screens/screen-name.html
       route: "/expected-route"
       elements:
         - id: element-id
           accessible:
             role: button
             name: "Click me"
           purpose: "Description"
           required: true
           viewmodel: "ViewModel.method"
   viewmodel_contracts:
     - name: "ScreenViewModel"
       test_pattern: "**/*screen*.test.*"
       properties:
         - name: propName
           type: string
       methods:
         - name: methodName
           async: true
   ```

5. Commit the contract:
   ```bash
   git add {{output_dir}}/final/design-contract.yaml
   git commit -m "feat: add design-contract.yaml for quality gate verification"
   git push origin $(git branch --show-current)
   ```

**Exit criteria:**
- design-contract.yaml exists in `{{output_dir}}/final/`
- All screens have elements with accessible roles and names
- Contract committed and pushed
"""
