six_sigma_gaps.md all present in `$OUTPUT_DIR/`."""

[[steps]]
id = "phase-2-5-fidelity-verification"
title = "Phase 2.5: Fidelity Verification (Sequential Sub-Agent)"
needs = ["phase-2-parallel-analysis"]
description = """

This sub-agent reads the outputs of all three Phase 2 sub-agents and verifies
every codebase claim against the actual codebase. It MUST run AFTER Phase 2
completes (not in parallel with it).

**Entry:** All three Phase 2 sub-agent output files exist in `$OUTPUT_DIR/`.
**Exit:** `$OUTPUT_DIR/verification-report.md` exists with every codebase claim classified.

Spawn a SINGLE sub-agent (NOT in background — must complete before Phase 3):

**Agent tool parameters:**
- `subagent_type`: `"general-purpose"`
- `run_in_background`: `false`
- `description`: `"Fidelity Verifier"`

**Prompt** (fill in $OUTPUT_DIR before passing):

```
You are the FIDELITY VERIFIER. Your job is to verify that every codebase claim made by
three analytical sub-agents is factually accurate. You have full codebase access.

## Source Material

Read ALL of these files from $OUTPUT_DIR/:
- codebase-snapshot.md (ground truth from Phase 1)
- Every dimension file: api.md, data.md, ux.md, scale.md, security.md, integration.md
- audit.md, conflicts.md, dependencies.md
- elevation_assessment.md
- six_sigma_gaps.md

## Your Process

### Step 1: Extract Codebase Claims

From all sub-agent output files, extract every claim about the EXISTING codebase:
- File paths
- Line number references
- Function/method names and signatures
- Struct field names
- CLI command names and flags
- CLI command capabilities (verify with --help)
- Formula step names AND COUNTS (run grep -c to get exact counts)
- Package/module references
- Timing/interval assertions (find the actual config value or code)
- Behavioral assertions about existing code
- ADR citations (verify the ADR exists and the quote is accurate)

PAY SPECIAL ATTENTION to:
- Step/item counts: run `grep -c` to get exact counts, don't trust prose
- Timing claims: find the actual config value or code that sets the interval
- Capability claims: verify via --help flags, not inference
- ADR quotes: verify verbatim accuracy against the actual ADR file

Ignore claims about PROPOSED new code — only verify claims about what EXISTS.

### Step 2: Verify Each Claim

For each claim:
1. Check codebase-snapshot.md first
2. If not in snapshot, Read/Grep/Bash the actual codebase to verify
3. Classify as:
   - VERIFIED: factually accurate
   - INACCURATE: factually wrong — provide the CORRECT information
   - UNVERIFIABLE: about proposed new code (exclude)

### Step 3: Write verification-report.md

Write to $OUTPUT_DIR/verification-report.md:

# Fidelity Verification Report

## Summary
- Total claims checked: N
- Verified: N
- Inaccurate: N (with corrections)
- Unverifiable: N (excluded)

## Claim Details

| # | Claim | Source File | Classification | Correction (if inaccurate) |

For every INACCURATE claim, the Correction column MUST contain the factually correct
information that should be used instead.

## Rules

- Verify by reading actual code, not by reasoning about what should exist
- Be strict: close-but-wrong file paths are INACCURATE
- Be fair: approximately correct line numbers (within ~20 lines) are VERIFIED
- Every classification must include what you did to verify
```

After the fidelity verifier completes, verify the report exists:
```bash
OUTPUT_DIR="${AF_WORKTREE:-$(git rev-parse --show-toplevel)}/.designs/{{issue}}"
ls -la "$OUTPUT_DIR/verification-report.md"
```

**Exit criteria:** `$OUTPUT_DIR/verification-report.md` exists with every codebase
claim classified as VERIFIED, INACCURATE, or UNVERIFIABLE."""

[[steps]]
id = "gate-b-synthesis-regrounding"
title = "GATE B: Pre-Synthesis Source Re-grounding + Fidelity Gate"
needs = ["phase-2-5-fidelity-verification"]
description = """

**MANDATORY GATE CHECK** — Do NOT close this step until BOTH checks pass.

Before writing a single line of `design-doc.md`, re-ground against source.md
and incorporate fidelity corrections.

**Entry criteria:** All sub-agent outputs and verification-report.md exist.

---

**Gate 3.0 — Source Re-grounding:**

**1. Re-open `$OUTPUT_DIR/source.md`** and read it top to bottom. Do not rely on
prior reads. Do not rely on sub-agent outputs as a proxy for source.

**2. Re-paste each AC** from `source.md` into a scratch checklist at
`$OUTPUT_DIR/synthesis-checklist.md`:

| AC-id | Verbatim text (RE-COPY from source.md RIGHT NOW) | Clauses (enumerated) | Each clause satisfied by which component? |
|-------|------------------------------------------------|----------------------|-------------------------------------------|
| AC-a  | "..."                                          | (i) ... (ii) ...     | (i) [comp] (ii) [comp]                    |

**Gate 3.0 check:**
- Every AC in `source.md` is listed.
- Every clause is individually enumerated.
- Every clause maps to a specific component.
- Any cell reading "covered generally" or "handled by design" FAILS — enumerate the clause and name the component.

```bash
OUTPUT_DIR="${AF_WORKTREE:-$(git rev-parse --show-toplevel)}/.designs/{{issue}}"
SOURCE_ACS=$(grep -c "^### AC-" "$OUTPUT_DIR/source.md")
CHECKLIST_ACS=$(grep -c "^| AC-" "$OUTPUT_DIR/synthesis-checklist.md")
[ "$SOURCE_ACS" = "$CHECKLIST_ACS" ] || { echo "FAIL: AC count mismatch between source.md and synthesis-checklist.md"; exit 1; }
echo "GATE B (source re-grounding AC count) passed."
```

If any clause has no owning component: STOP. The design does not address that
requirement. Return to `phase-2-parallel-analysis` and add coverage.

---

**Gate 3.0b — Fidelity Gate:**

**3. Read `$OUTPUT_DIR/verification-report.md`** completely.

For every claim marked INACCURATE:
1. Note the correction provided by the verifier.
2. When writing design-doc.md, use the CORRECTED information, not the original claim.
3. If a sub-agent's entire analysis depends on an inaccurate claim, note this in
   the Decisions Made table as a reduced-confidence finding.

**Gate 3.0b check:** design-doc.md (when written in Phase 3) must contain ZERO
claims that verification-report.md flagged as INACCURATE. Every inaccurate claim
must be replaced with its correction or removed entirely.

Record any required corrections in `$OUTPUT_DIR/synthesis-checklist.md` as an
addendum so they are available during synthesis.

**If PASS for both 3.0 and 3.0b:** Close this step and continue.

**Exit criteria:** `$OUTPUT_DIR/synthesis-checklist.md` exists. Every AC listed
with enumerated clauses. Every clause has an owning component. All fidelity
corrections noted for Phase 3 use."""

[[steps]]
id = "phase-3-synthesis"
title = "Phase 3: Synthesis — Cross-Perspective Conflicts, Elevation, Gaps, Design Doc"
needs = ["gate-b-synthesis-regrounding"]
description = """

Synthesize all prior artifacts into the implementation-ready design document.
This is where the design actually happens — sub-agents provided evidence;
synthesis resolves conflicts and makes decisions.

**Entry criteria:** `synthesis-checklist.md` exists. All sub-agent outputs and
fidelity corrections available.

---

**Step 3.1: Read All Sub-Agent Outputs**

Read each file completely:
1. `$OUTPUT_DIR/audit.md` — dimension analysis audit
2. `$OUTPUT_DIR/conflicts.md` — cross-dimension conflict matrix
3. `$OUTPUT_DIR/dependencies.md` — dependency graph
4. `$OUTPUT_DIR/elevation_assessment.md` — architecture elevation verdict
5. `$OUTPUT_DIR/six_sigma_gaps.md` — gap analysis
6. Each dimension file (api.md, data.md, ux.md, scale.md, security.md, integration.md)
7. `$OUTPUT_DIR/verification-report.md` — fidelity corrections

**If any file is missing:** That sub-agent failed. Re-spawn it (single sub-agent,
not all three). Do not proceed with partial analysis.

---

**Step 3.1b: Cross-Perspective Conflict Mining (REQUIRED)**

The three sub-agents analyzed independently. Their recommendations may conflict
in ways none could detect alone.

1. **Dimension vs Elevation conflicts**: Does a dimension introduce an abstraction
   the elevation flagged? Does a recommendation contradict an elevation candidate?
   If elevation verdict was "Frame-lift offered," do dimensions depend on that frame?

2. **Dimension vs Gap conflicts**: Does closing a feasible gap conflict with a
   dimension recommendation? Does a gap mitigation require a rejected component?

3. **Dimension vs Decision History conflicts**: For each dimension's recommended
   option, check whether it contradicts any ADR or prior design from the Decision
   History section of codebase-snapshot.md. This is the primary defense against
   designs that violate existing architectural decisions.

4. **Produce a supplementary conflict table:**

| Finding Source | Finding | Conflicts With | Nature | Resolution |
|---------------|---------|----------------|--------|------------|
| Elevation | [finding] | [dimension] | [tension/conflict] | [resolution] |
| Gap Analysis | [gap] | [dimension] | [tension/conflict] | [resolution] |
| Decision History | [ADR/prior design] | [dimension] | [tension/conflict] | [resolution] |

If no cross-perspective conflicts found, document explicitly with reasoning
for each perspective pair checked (elevation-vs-dimensions, gaps-vs-dimensions,
elevation-vs-gaps, decision-history-vs-dimensions).

---

**Step 3.2: Process Elevation Verdict**

Read the verdict from `elevation_assessment.md`. Branch:

| Verdict | Action |
|---------|--------|
| Frame correct | Proceed with synthesis using dimension analysis as-is |
| Frame-lift offered | Record the alternative in "Alternatives Considered". Proceed with instance design but document the trade-off |
| Frame-lift required | Dimension analysis was in the wrong frame. Re-read required revisions. Redesign affected dimensions. May require re-spawning Sub-agent 1 |
| Frame artificial | The entire concern is a symptom of an abstraction. Reframe around removing the abstraction. Return to Phase 1 and rewrite source.md |

---

**Step 3.3: Process Six-Sigma Gaps**

Read `six_sigma_gaps.md`. For each gap:

| Feasibility | Action |
|-------------|--------|
| Feasible | Design MUST address this gap. Add a component/phase/mitigation |
| Partially feasible | Document in Risk Registry with caveats. Address what is feasible |
| Infeasible | Document in "Six-Sigma Caveats" with specific logical constraint |

---

**Step 3.4: Write `$OUTPUT_DIR/design-doc.md`**

Use this template:

```markdown
# Design: [Problem Title]

## Executive Summary
[2-3 paragraph overview incorporating findings from all three perspectives]

## Constraints Respected
All proposals respect the constraints captured in source.md:
- C-1: [short name] — [compliance note]

## AC Traceability (REQUIRED)

| AC id | Verbatim quote from source.md | Clause breakdown | Addressed by | Verified by |
|-------|------------------------------|------------------|--------------|-------------|
| AC-a  | "..."                        | (i)...(ii)...    | [component]  | [test name] |

## Architecture Elevation Verdict

**Verdict**: [from elevation_assessment.md]

[Verdict-specific documentation as per Step 3.2]

## Problem Statement
[Must match source.md verbatim — do not paraphrase]

## Proposed Design

### Overview
[High-level approach — 1 paragraph]

### Key Components
[Main pieces and how they fit together]

### Component Dependency Graph
[From dependencies.md]

### Interface
[CLI/API summary from api.md]

### Data Model
[Schema summary from data.md — MUST match storage constraints]

## Cross-Dimension Trade-offs
[From conflicts.md — ALL tensions, not just the obvious ones]

| Conflict | Resolution | Rationale |

Every conflict row MUST have a resolution. "Unresolved" is NOT acceptable.

## Cross-Perspective Conflicts
[From Step 3.1b]

| Finding Source | Finding | Conflicts With | Nature | Resolution |

## Decisions Made

| Decision | Options Considered | Chosen | Rationale | Reversibility |

## Risk Registry

| Risk | Severity | Likelihood | Mitigation | Owner | Source |
| [risk] | ... | ... | ... | ... | [dimension / elevation / gap analysis] |

## Six-Sigma Caveats

| Gap | Category | Impact | Feasibility | Constraint |

[Closing paragraph: practical ceiling and accepted residual risk]

## Implementation Plan

### Phase 1: [Name] (Effort: [X])
**Deliverables:**
1. [deliverable]

**Source ACs satisfied**: AC-[id], AC-[id]
**Dependencies**: [what must exist first]
**Risks addressed**: [from registry]
**Six-Sigma gaps closed**: [which feasible gaps]

**Phase acceptance criteria:**
- [ ] [specific test or observable behavior]
- [ ] [another concrete pass/fail check]

[Repeat for each phase — every phase MUST have at least 2 checkbox acceptance criteria]

## Appendix: Analysis Artifacts
- [source.md](source.md)
- [verification.md](verification.md)
- [codebase-snapshot.md](codebase-snapshot.md)
- Dimension analyses: api.md, data.md, ux.md, scale.md, security.md, integration.md
- [audit.md](audit.md)
- [conflicts.md](conflicts.md)
- [dependencies.md](dependencies.md)
- [elevation_assessment.md](elevation_assessment.md)
- [six_sigma_gaps.md](six_sigma_gaps.md)
- [verification-report.md](verification-report.md)
```

**Fidelity enforcement:** Before writing ANY codebase claim into design-doc.md,
cross-check it against `verification-report.md`. If it was flagged INACCURATE,
use the corrected version from the report.

**Context management:** Synthesis is context-heavy. If context is filling up
after reading all outputs but before writing design-doc.md:
```bash
af handoff -s "Phase 3 synthesis in progress — outputs read, ready to write design-doc" \
  -m "Issue: {{issue}}
Output dir: $OUTPUT_DIR
Completed: read all sub-agent outputs, cross-perspective conflict mining, elevation/gap processing
Ready for: write design-doc.md (continue in phase-3-synthesis step)"
```

**Exit criteria:** `$OUTPUT_DIR/design-doc.md` exists. AC Traceability table
populated. Elevation verdict honored. Feasible gaps closed. No INACCURATE claims
imported from sub-agents."""

[[steps]]
id = "phase-4-finalize"
title = "Phase 4: Final Verification and Commit"
needs = ["phase-3-synthesis"]
description = """

Final verification of the complete design. All cross-checks must pass before
the invariant post-work sequence begins.

**Entry criteria:** `design-doc.md` exists.

---

**Step 4.1: Artifact Completeness Check**

Verify all required files exist:

```bash
OUTPUT_DIR="${AF_WORKTREE:-$(git rev-parse --show-toplevel)}/.designs/{{issue}}"
for f in source.md verification.md codebase-snapshot.md audit.md conflicts.md \
  dependencies.md elevation_assessment.md six_sigma_gaps.md verification-report.md \
  design-doc.md; do
  [ -f "$OUTPUT_DIR/$f" ] || { echo "MISSING: $OUTPUT_DIR/$f"; exit 1; }
done
echo "All required artifacts present."

# Check dimension files (at minimum api.md, data.md, integration.md for small scope)
for f in api.md data.md integration.md; do
  [ -f "$OUTPUT_DIR/$f" ] || { echo "MISSING dimension file: $OUTPUT_DIR/$f"; exit 1; }
done
echo "Dimension files present."
```

---

**Step 4.2: Six-Sigma Gaps Addressed**

For EVERY gap in `six_sigma_gaps.md` classified as **Feasible**:
- Does `design-doc.md` contain a component, phase, or mitigation that closes this gap?
- If NO: the design is incomplete. Return to `phase-3-synthesis` and add coverage.

For EVERY gap classified as **Partially feasible**:
- Is the feasible portion addressed in the design?
- Is the infeasible portion documented in the Risk Registry or Six-Sigma Caveats?

---

**Step 4.3: Elevation Verdict Honored**

- If **Frame correct**: verify the design does not introduce frame-level issues the elevation cleared.
- If **Frame-lift offered**: verify the trade-off is documented.
- If **Frame-lift required**: verify the design was substantively revised (changed components/interfaces/data model, not just annotated).
- If **Frame artificial**: verify the design is reframed around abstraction removal.

---

**Step 4.3b: Decision History Respected**

- No recommended option in `design-doc.md` contradicts an ADR from the Decision
  History section of `codebase-snapshot.md`.
- No recommended option reverses a deliberate recent change without explicit
  justification in the Decisions Made table.
- If any contradiction exists without justification: STOP, return to
  `phase-3-synthesis` and add justification or change the recommendation.

---

**Step 4.4: Final AC Verification**

Re-read the AC Traceability table in `design-doc.md` against `source.md`:

```bash
OUTPUT_DIR="${AF_WORKTREE:-$(git rev-parse --show-toplevel)}/.designs/{{issue}}"
SOURCE_ACS=$(grep -c "^### AC-" "$OUTPUT_DIR/source.md")
DOC_ACS=$(grep -c "^| AC-" "$OUTPUT_DIR/design-doc.md")
[ "$SOURCE_ACS" = "$DOC_ACS" ] || { echo "FAIL: design-doc.md AC Traceability row count ($DOC_ACS) does not match source.md AC count ($SOURCE_ACS)"; exit 1; }

SOURCE_CS=$(grep -c "^### C-" "$OUTPUT_DIR/source.md")
DOC_CS=$(grep -c "^- C-" "$OUTPUT_DIR/design-doc.md")
[ "$DOC_CS" -ge "$SOURCE_CS" ] || { echo "FAIL: design-doc.md Constraints Respected count is less than source.md constraint count"; exit 1; }

echo "Final AC/Constraint verification passed."
```

Every row must have a specific addressing component AND a specific verifying test.
Any missing row or unmapped clause: STOP, return to `gate-b-synthesis-regrounding`.

---

**Step 4.5: Dependency Verification**

- Dependency graph matches `design-doc.md`'s Component Dependency Graph.
- Implementation phases respect dependencies (no component before its deps).
- No circular dependencies.

---

**Step 4.6: Risk Verification**

- Every risk in the Risk Registry has a mitigation.
- Every risk is assigned to an implementation phase.
- Risks from all three sources (dimensions, elevation, gap analysis) are represented.

---

**Step 4.7: Commit Design Artifacts**

In the agent-driven formula context, the PR IS the review workflow (Supervisor
reviews the PR). Commit now:

```bash
OUTPUT_DIR="${AF_WORKTREE:-$(git rev-parse --show-toplevel)}/.designs/{{issue}}"
cd "${AF_WORKTREE:-.}"
find .designs/ -maxdepth 1 -type l -delete
git add "$OUTPUT_DIR"/
git commit -m "design: design-v7 artifacts for {{issue}}

- source.md (verbatim requirements)
- codebase-snapshot.md (verified ground truth for sub-agents)
- verification.md (Gate A: forced-enumeration AC/constraint table)
- dimension files (api/data/ux/scale/security/integration)
- audit.md, conflicts.md, dependencies.md (dimension analysis)
- elevation_assessment.md (architecture elevation verdict)
- six_sigma_gaps.md (six-sigma gap analysis)
- verification-report.md (fidelity verification of all codebase claims)
- synthesis-checklist.md (Gate B: pre-synthesis re-grounding)
- design-doc.md (with AC Traceability, elevation verdict, six-sigma caveats)"
```

**If any verification fails:** STOP. Return to the indicated earlier step.
Do NOT paper over a failing check.

**Exit criteria:** All verifications pass. Design artifacts committed.
Ready for invariant post-work steps."""

# ============================================================================
# POST-WORK INVARIANT STEPS
# ============================================================================

[[steps]]
id = "self-review"
title = "Self-review changes"
needs = ["phase-4-finalize"]
description = """
Review your own changes before running tests.

**1. Review the diff:**
```bash
git diff origin/{{default_branch}}...HEAD     # All changes vs main
git log --oneline origin/{{default_branch}}..HEAD  # All commits
```

**2. Check for common issues:**

| Category | Look For |
|----------|----------|
| Bugs | Off-by-one, null handling, edge cases |
| Security | Injection, auth bypass, exposed secrets |
| Style | Naming, formatting, code organization |
| Completeness | Missing error handling, incomplete paths |
| Cruft | Debug prints, commented code, TODOs |

**3. Fix issues found:**
Don't just note them — fix them now. Amend or add commits as needed.

**4. Verify no unintended changes:**
```bash
git diff --stat origin/{{default_branch}}...HEAD
# Only files relevant to {{issue}} should appear — specifically the design artifacts under .designs/{{issue}}/
```

If you accidentally modified unrelated files, remove those changes.

**Exit criteria:** Changes are clean, reviewed, and ready for testing."""

[[steps]]
id = "run-tests"
title = "Run tests and verify coverage"
needs = ["self-review"]
description = """
Verify your changes don't break anything.

For a pure-design formula like design-v7, your diff is design documentation
under `.designs/{{issue}}/`. There is typically no production code change. The
test run is a sanity check that the branch is still green.

**1. Run the full test suite:**
```bash
# Discover the project's test command from CLAUDE.md, Makefile, package.json, etc.
# Then run it. Examples: make test, npm test, cargo test, go test ./...
```

**ALL TESTS MUST PASS.** Do not proceed with failures.

**2. If tests fail:**
- Read the failure output carefully
- Determine if your change caused it:
  - If yes: Fix it. Since this is a design-only formula, any test breakage
    likely means you accidentally committed non-design files — revert those.
  - If no (pre-existing): File a bead, but still must pass for your PR

```bash
# Check if failure exists on main:
git stash
git checkout {{default_branch}}
# Run the same test command you discovered above
git checkout -
git stash pop
```

**3. Validate terraform if .tf files were modified:**
```bash
TF_CHANGED=$(git diff --name-only origin/{{default_branch}}...HEAD -- '*.tf' | head -1)
if [ -n "$TF_CHANGED" ]; then
  echo "Terraform files modified — running validation..."
  TF_DIR=$(dirname "$TF_CHANGED")
  (cd "$TF_DIR" && terraform validate) || { echo "FAIL: terraform validate failed"; exit 1; }
  terraform fmt -check -recursive "$TF_DIR" || { echo "FAIL: terraform fmt check failed — run 'terraform fmt'"; exit 1; }
  echo "Terraform validation passed."
fi
```

**Exit criteria:** All tests pass, terraform valid (if applicable)."""

[[steps]]
id = "self-verify"
title = "Verify design-doc.md matches design contract"
needs = ["run-tests"]
description = """
Gate: verify the produced `design-doc.md` matches the contract established by
`source.md` (Jidoka).

design-v7 PRODUCES the design contract — so this step is a final
self-verification that the produced design doc is faithful to the source.

**1. Re-open `$OUTPUT_DIR/source.md`** one last time.

**2. For each AC in `source.md`:**
- Find the corresponding row in `design-doc.md` AC Traceability table.
- Confirm the "verbatim quote" column matches `source.md` (no paraphrase).
- Confirm the "Addressed by" and "Verified by" columns are concrete.

**3. For each constraint in `source.md`:**
- Confirm it appears in `design-doc.md` "Constraints Respected" section.
- Confirm no recommendation in the design violates it.

**4. Verify elevation verdict is honored:**
- If Frame-lift required/Frame artificial: verify substantive revision, not annotation.

**5. Verify all feasible gaps are closed:**
- Cross-check six_sigma_gaps.md feasible gaps against design-doc.md components.

**6. Document any deviation with justification:**
If any AC clause or constraint cannot be faithfully addressed, STOP and mail
Supervisor for decision. Do NOT quietly drop it from the design-doc.

**Exit criteria:** `design-doc.md` verified against `source.md`. No AC silently
dropped. No constraint silently violated. Elevation verdict honored. Feasible
gaps closed."""

[[steps]]
id = "cleanup-workspace"
title = "Clean up workspace"
needs = ["self-verify"]
description = """
Ensure workspace is pristine before handoff.

**Note:** The design-v7 process creates design documents in `.designs/{{issue}}/`
which ARE the actual deliverables — these should NOT be deleted. They are the
work product, committed in `phase-4-finalize`.

**No skill artifacts to remove.** All output files (source.md, verification.md,
codebase-snapshot.md, dimension files, audit.md, conflicts.md, dependencies.md,
elevation_assessment.md, six_sigma_gaps.md, verification-report.md,
synthesis-checklist.md, design-doc.md) are committed deliverables.

**1. Check for uncommitted changes:**
```bash
git status
```
Must show "working tree clean". If not:
- Commit legitimate changes
- Discard garbage: `git checkout -- .`

**2. Check for untracked files:**
```bash
git status --porcelain
```
Should be empty. If not:
- Add to .gitignore if appropriate
- Remove if temporary: `rm <file>`
- Commit if needed

**3. Check stash:**
```bash
git stash list
```
Should be empty. If not:
- Pop and commit: `git stash pop && git add -A && git commit`
- Or drop if garbage: `git stash drop`

**4. Push your branch:**
```bash
git push -u origin $(git branch --show-current)
```

**5. Verify nothing left behind:**
```bash
git status                  # Clean
git stash list              # Empty
git log origin/{{default_branch}}..HEAD   # Your commits
git diff origin/{{default_branch}}...HEAD # Your changes (expected — design artifacts only)
```

**Exit criteria:** Branch pushed, workspace clean, no cruft."""

[[steps]]
id = "prepare-for-review"
title = "Prepare work for review"
needs = ["cleanup-workspace"]
description = """
Verify work is complete and ready for PR submission.

**Note:** Do NOT close the issue. The Supervisor will close it after successful merge.
This enables conflict-resolution retries without reopening closed issues.

**1. Verify the issue shows your work:**
```bash
af bead show {{issue}}
# Status should still be 'in_progress' (you're working on it)
```

**2. Add completion notes:**
```bash
af bead update {{issue}} --notes "Completed design-v7 exploration for {{issue}}.
Design artifacts in .designs/{{issue}}/:
- source.md (verbatim requirements)
- codebase-snapshot.md (verified ground truth for sub-agents)
- verification.md (Gate A: forced-enumeration)
- dimension files (per scope calibration)
- audit.md, conflicts.md, dependencies.md (dimension analysis)
- elevation_assessment.md (architecture elevation — 4-phase frame interrogation)
- six_sigma_gaps.md (independent gap discovery with feasibility classification)
- verification-report.md (fidelity verification of all codebase claims)
- synthesis-checklist.md (Gate B: pre-synthesis re-grounding)
- design-doc.md (unified design with AC Traceability, elevation verdict, six-sigma caveats, cross-perspective conflicts)"
```

**Exit criteria:** Issue updated with completion notes."""

[[steps]]
id = "submit-and-exit"
title = "Submit PR and exit"
needs = ["prepare-for-review"]
description = """
Create a PR and signal completion.

**Ephemeral Agent Model:**
Once you submit, you're done. The Supervisor will:
1. Review and merge your PR
2. Handle rebasing (mechanical rebases done automatically)
3. Close your issue after successful merge
4. Create conflict-resolution tasks if needed (fresh agent handles those)

**1. Create a pull request:**
```bash
gh pr create --title "design: {{issue}} (design-v7)" --body "Design artifacts for {{issue}} via design-v7 sub-agent orchestration.

See .designs/{{issue}}/design-doc.md for the unified design.

design-v7 forcing functions applied:
- Verbatim source captured in source.md before any paraphrase
- Codebase snapshot verified before sub-agent launch
- Gate A: forced-enumeration verification.md (every AC + constraint has dimension owner)
- 3 parallel independent sub-agents: Dimensions, Elevation, Six-Sigma Gap
- Fidelity verifier checked all codebase claims against actual code
- Gate B: synthesis-checklist.md re-grounded against source.md, mapped every AC clause
- Cross-perspective conflict mining (dimension-vs-elevation, dimension-vs-gaps)
- Elevation verdict: [insert verdict]
- design-doc.md: AC Traceability, elevation verdict integration, six-sigma caveats, risk registry"
```

**2. Complete the formula:**
```bash
af done
```

`af done` closes the current formula step and — since this is the last step —
mails WORK_DONE to the Supervisor and cleans up the checkpoint.

**3. You're done:**
Your PR is open and the Supervisor knows you're done.
Your workspace can be cleaned up — all work is pushed to origin.

If you have context remaining, you may:
- Pick up new work from `af prime`
- Or use `af handoff` to cycle to a fresh session

If the Supervisor needs conflict resolution, it will dispatch a fresh agent.
You do NOT need to wait around.

**Exit criteria:** PR created, Supervisor notified via WORK_DONE, agent done."""

