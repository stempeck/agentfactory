# Also check dimension files exist (per scope)
ls "$OUTPUT_DIR"/api.md "$OUTPUT_DIR"/data.md "$OUTPUT_DIR"/integration.md
```

**If any sub-agent output file is missing:** Re-spawn ONLY the missing sub-agent
(not all three). Do not proceed with partial analysis.

**Context management:** Launching three sub-agents and waiting for them is
