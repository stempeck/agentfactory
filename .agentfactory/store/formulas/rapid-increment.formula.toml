description = """
## Overview
Lean, adaptive incremental workflow that addresses the UNRESOLVED review comments on a pull request, scaling process rigor to the size of the change.

Requirements come from the assigned pull request — the set of UNRESOLVED review comment
threads is the problem statement. The agent works on a branch created FROM the PR head (so it
already contains every PR commit), addresses the unresolved comments with rigor scaled to
complexity, fast-forward pushes the fixes back to the ORIGINAL PR branch (no new PR), replies
to and resolves each addressed thread with a note of 20 words or less, and leaves the PR's
state (Draft / Ready for review) exactly as found.

This formula guides an agent through the rapid-increment process:
1. Capture the PR's unresolved review threads — they are the problem statement
2. Classify complexity (Trivial/Moderate/Complex/Epic) and, for Complex/Epic, enumerate every
   unresolved thread in a PLAN.md checklist so none is missed
3. Investigate the code each thread touches, with rigor scaled to the tier
4. Write failing tests FIRST for behavioral fixes, then implement to green
5. Verify the full suite and give every thread an explicit disposition (ADDRESSED / DEFERRED)
6. Fast-forward push to the PR branch and resolve the addressed threads, leaving PR state as found

Process weight scales to the change: a one-line style fix stays lean; a cross-cutting set of
comments gets full rigor.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| pr_uri | input (cli) | Pull request whose unresolved comments to address: full GitHub URL, owner/repo#number, or bare PR number |

## Failure Modes

| Situation | Action |
|-----------|--------|
| Zero unresolved comments on the PR | Mail dispatcher NOTHING_TO_DO, close remaining steps with that reason, complete the formula |
| Tests pass before implementation | The test isn't exercising new behavior — fix the test, not the code |
| Tests fail 3x on the same thread | Stop, re-read the comment, use a subagent to review the approach |
| Tests fail | Fix the code, never weaken the test. Do not proceed with failures |
| Running low on time/context | Address the highest-value comments first and ship; reply-defer the rest |
| Context filling up | Use af handoff to cycle to a fresh session |
| Blocked / unclear comment | Mail Supervisor, do not guess |
| Push to PR branch rejected (non-fast-forward) | Fetch, rebase onto the new PR head, re-run tests, push again |
| Push to PR branch denied (fork without maintainer-edit) | Mail Supervisor ESCALATION — do not force-push or open a new PR |
| Thread resolve mutation fails | Retry once; if still failing, leave the thread unresolved and note it in delivery.md |
| Comment is a question/discussion (no code change) | Reply with an answer but leave the thread UNRESOLVED for the human |

## Anti-Patterns to Avoid

| Anti-Pattern | Prevention |
|--------------|------------|
| Skipping the failing-test gate | GATE 2 is mandatory for any behavioral fix — a test that passes before the fix proves nothing |
| Weakening a test to make it pass | Fix the code, not the test |
| Over-classifying a small change | Process overhead kills speed — a one-line comment fix is Trivial |
| Under-classifying a cross-cutting change | Skipping investigation causes rework — investigate Complex/Epic first |
| Forgetting test_results.txt | Save full suite output every time — it is the judging artifact |
| Implementing untested behavioral paths | Every behavioral change a comment asks for MUST have a test |
| DNF when partial work is possible | Address what you can and reply-defer the rest — never deliver zero |
| Creating a new PR for the fixes | Push back to the ORIGINAL PR branch — the PR already exists |
| Changing PR state (draft/ready/close/merge) | NEVER run gh pr ready/close/reopen/merge — leave the PR exactly as found |
| Force-pushing the PR branch | Only fast-forward pushes of your own commits on top of the PR head |
| Rewriting or squashing the author's commits | Your commits sit ON TOP of the PR head — author history untouched |
| Resolving threads you did not address | Only ADDRESSED threads get resolved, each with a note of 20 words or less |
| Implementing "found work" no unresolved comment asked for | Out-of-scope findings go to out_of_scope.md and the completion mail — NEVER the diff (sole exception: pre-existing baseline test failures per preflight-tests) |

## !IMPORTANT - MANDATORY Exact Step Execution
Execute each formula step EXACTLY as written, in order, with no modifications.
Every step produces a file artifact at a known path. `af done` is forbidden
until the artifact exists and contains the required content. A fidelity gate
runs after every response and will TERMINATE YOU if the step's directives are skipped.
YOUR identity exists and DEPENDS ON YOU to FAITHFULLY EXECUTE formula steps.
"""
formula = "rapid-increment"
version = 1

# ============================================================================
# PRE-WORK INVARIANT STEPS
# ============================================================================

[[steps]]
id = "load-context"
title = "Load context and capture the PR's unresolved review threads"
description = """
Initialize your session and capture the PR's unresolved review threads — they
are your problem statement.

**1. Prime your environment:**
```bash
af prime                    # Load role context
```

**2. Check inbox for additional context:**
```bash
af mail inbox
# Read any HANDOFF or assignment messages
```

**3. Resolve the PR reference from {{pr_uri}}:**
The input may arrive in one of three forms:

- **Full URL**: `https://github.com/owner/repo/pull/42` — extract owner/repo and number
- **Short form**: `owner/repo#42` — extract owner/repo and number
- **Bare number**: `42` — number only; repo is the current repository (`gh repo view --json nameWithOwner`)

**4. Verify access and snapshot the PR state:**
```bash
gh auth status
gh pr view <number> --repo <owner/repo> --json number,title,state,isDraft,headRefName,headRefOid,baseRefName,url,headRepositoryOwner
mkdir -p todos/rapid-increment
```

Write `todos/rapid-increment/pr_context.md` with: owner/repo, PR number, URL,
title, state, isDraft, headRefName, headRefOid, baseRefName, head repository
owner (fork detection), and the raw {{pr_uri}} input. This snapshot is the
reference for "leave the PR exactly as found" at delivery.

**5. Fetch the UNRESOLVED review threads (GraphQL — REST cannot see thread resolution):**
```bash
gh api graphql -F owner='<owner>' -F repo='<repo>' -F pr=<number> -f query='
query($owner: String!, $repo: String!, $pr: Int!) {
  repository(owner: $owner, name: $repo) {
    pullRequest(number: $pr) {
      reviewThreads(first: 100) {
        nodes {
          id
          isResolved
          path
          line
          comments(first: 50) { nodes { databaseId author { login } body } }
        }
      }
    }
  }
}' --jq '.data.repository.pullRequest.reviewThreads.nodes | map(select(.isResolved == false))'
```

**6. Write `todos/rapid-increment/unresolved_threads.md`** — one section per
unresolved thread:
- Thread N: the thread node `id` (needed for the resolve mutation at delivery)
- `path:line`
- Top comment `databaseId` (needed for the reply at delivery)
- The FULL text of every comment in the thread, verbatim, with author

This file is the problem statement for every later phase.

**7. Decision:**
- One or more unresolved threads → proceed.
- ZERO unresolved threads → nothing to do:
```bash
af mail send supervisor -s "NOTICE: no unresolved comments on PR" -m "PR: {{pr_uri}}
All review threads are already resolved. No changes made."
```
  Then close this and EACH remaining step with reason "No unresolved comments".
  Do NOT invent work.

**8. Understand the requirements:**
For each thread: what change is the comment asking for? Classify provisionally —
actionable (a code change is expected) vs question/discussion (reply only — it
will be DEFERRED and never resolved by you). Also note whether the change is
behavioral (alters program behavior → needs a test) or non-behavioral (style,
rename, comment wording, docs, formatting → no new test required).

**9. Verify you can proceed.** If blocked or unclear, mail Supervisor immediately:
```bash
af mail send supervisor -s "HELP: Unclear requirements" -m "PR: {{pr_uri}}
Question: <what you need clarified>"
```

**Exit criteria:** pr_context.md (state snapshot) and unresolved_threads.md
(full thread inventory with thread ids and comment ids) exist; you understand
each comment's ask."""

[[steps]]
id = "branch-setup"
title = "Set up working branch from the PR head"
needs = ["load-context"]
description = """
Ensure you're on a clean work branch CREATED FROM THE PR HEAD.

**Why this shape:** Your work branch starts at the PR head, so it already
contains every PR commit — the safe equivalent of merging the PR into your
branch. Delivery later is a plain fast-forward push of your commits back onto
the PR branch: no cherry-picking, no rewriting the author's history.

**1. Check current branch state:**
```bash
git status
git branch --show-current
```

**2. Ensure clean working state:**
```bash
git status                  # Should show "working tree clean"
git stash list              # Should be empty
```

If dirty state from previous work:
```bash
# If changes are relevant to this PR:
git add -A && git commit -m "WIP: <description>"

# If changes are unrelated cruft:
git stash push -m "unrelated changes before {{pr_uri}}"
# Or discard if truly garbage:
git checkout -- .
```

**3. Check out the PR head and create the work branch:**
```bash
git fetch origin
gh pr checkout <number> --repo <owner/repo> --branch increment/pr-<number>
git rev-parse HEAD > todos/rapid-increment/baseline_sha.txt
```

`--branch increment/pr-<number>` names the LOCAL branch uniquely. Without it,
gh creates a local branch named after the PR's head ref — which FAILS when any
other worktree of this repo has that branch checked out (per-agent worktrees
share one repository; local branch names are repo-global).

`baseline_sha.txt` is the PR head you started from — every later diff, test
comparison, and the blind-review patch are measured against it (NOT against
origin/{{default_branch}}).

For fork PRs, `gh pr checkout` configures the remote automatically. Pushing
back later requires the author's "Allow edits by maintainers" — verified at
delivery, escalated if denied.

**4. Do NOT rebase onto origin/{{default_branch}}.**
The PR head is your baseline. Rebasing onto {{default_branch}} would rewrite the author's
history and make fast-forward delivery impossible. If the PR is stale against
{{default_branch}}, that is the author's concern — yours is the unresolved comments.

**Exit criteria:** On branch increment/pr-<number>, clean tree, baseline sha recorded."""

[[steps]]
id = "validate-contract"
title = "Validate design contract (if present)"
needs = ["branch-setup"]
description = """
Gate: incoming design contract inspection (Poka-yoke).

Check if a design contract exists for this work:
```bash
# Look for design documents related to this PR
ls .designs/pr-<number>/design-doc.md 2>/dev/null || echo "No design contract found"
```

**If design contract EXISTS:**
- Read it completely
- Extract key requirements and constraints
- Note any specific implementation guidance
- These become verification points for self-verify later

**If NO design contract exists:**
- This is acceptable — not all work has a prior design
- Close this step with reason "No design contract found"
- Proceed without contract verification

**Exit criteria:** Design contract reviewed (if present), or step closed as N/A."""

[[steps]]
id = "preflight-tests"
title = "Record baseline tests on the PR head"
needs = ["validate-contract"]
description = """
Check if the PR branch is healthy BEFORE starting your work. This baseline is
what GATE 4 and run-tests compare against later.

**The Scotty Principle:** Don't walk past a broken warp core. But also don't
let someone else's mess consume your entire mission.

**1. Run the tests on the PR head baseline (you are already on it):**
```bash
# Discover the project's test command from CLAUDE.md, Makefile, package.json, etc.
# Then run it. Examples: make test, npm test, cargo test, go test ./...
<TEST_CMD> 2>&1 | tee todos/rapid-increment/baseline_tests.log
```

**2. If tests PASS:**
Baseline recorded as green. Continue to phase-0-classify step.

**3. If tests FAIL on the PR head:**

These failures are PRE-EXISTING on the PR — part of the PR's current state,
possibly even the subject of an unresolved comment. Make a judgment call:

| Situation | Action |
|-----------|--------|
| A failing test is what an unresolved comment asks to fix | In scope — it is part of your problem statement |
| Failure unrelated to any comment, quick (<15 min) | Fix it on your work branch and commit IMMEDIATELY with message prefix "preflight:" — it rides along in the same delivery; the prefix exempts it from the thread-coverage scope audit |
| Failure unrelated and large | Record it in baseline_tests.log, notify Supervisor, proceed — do NOT let it consume your mission |

**Notify path:**
```bash
af mail send supervisor -s "NOTICE: PR branch has failing tests" \
  -m "PR: {{pr_uri}}
Pre-existing failures on the PR head (recorded in baseline_tests.log).
Proceeding with the unresolved-comment work."
```

**Context consideration:**
If baseline triage consumed significant context:
```bash
af handoff -s "Baseline recorded, ready for assigned work" \
  -m "PR: {{pr_uri}}
Baseline: todos/rapid-increment/baseline_tests.log
Ready to start: phase-0-classify step"
```
Fresh session continues from phase-0-classify.

**Exit criteria:** Baseline test results recorded in baseline_tests.log, ready to begin classification."""

# ============================================================================
# DOMAIN STEPS — lean rapid process, reoriented to the unresolved comment threads
# ============================================================================

[[steps]]
id = "phase-0-classify"
title = "Phase 0: Classify complexity"
needs = ["preflight-tests"]
description = """

Read `todos/rapid-increment/unresolved_threads.md` — the unresolved review threads are your
problem statement. Classify the complexity of addressing them AS A WHOLE — this governs how
much process the rest of the formula applies.

| Signal | Trivial | Moderate | Complex | Epic |
|--------|---------|----------|---------|------|
| Files touched (across all fixes) | 1-2 | 2-4 | 5-10 | 10+ |
| New models/tables | 0 | 0-1 | 1-3 | 3+ |
| Concurrency needed | No | No | Maybe | Yes |
| Cross-component | No | No | Yes | Yes |
| Design decisions | 0 | 1-2 | 3-5 | 5+ |
| Unresolved threads | 1-2 | 3-5 | 6-10 | 10+ |

**Trivial/Moderate:** Note the classification mentally. No PLAN.md needed. Proceed —
gate-0, gate-1, and gate-6 will be closed as N/A.

**Complex/Epic:** Write the classification to `todos/rapid-increment/PLAN.md`:
```bash
mkdir -p todos/rapid-increment
```

```markdown
## Classification: [Complex|Epic]
## Rationale: [1-2 sentences with signals observed]
## Files to modify: [list]
## Key risks: [list]
## Verification: [test command]

## Thread Checklist (enumerate EVERY unresolved thread)
- [ ] Thread 1 — [path:line] — [the change the comment asks for]
- [ ] Thread 2 — [path:line] — [the change the comment asks for]
... one checkbox per thread in unresolved_threads.md ...
```

**MANDATORY for Complex/Epic:** Every unresolved thread from `unresolved_threads.md` MUST
appear as a checklist item. The Thread Checklist IS your guarantee that no comment is missed —
a missing thread = a missed comment.

**Anti-pattern:** Never over-classify (process overhead kills speed) and never
under-classify (skipping investigation causes rework). Be honest about the signals.

**Exit criteria:** Complexity classified. For Complex/Epic, `todos/rapid-increment/PLAN.md`
exists with classification AND a Thread Checklist enumerating every unresolved thread."""

[[steps]]
id = "gate-0-plan-checklist"
title = "GATE 0: PLAN.md enumerates every unresolved thread (Complex/Epic only)"
needs = ["phase-0-classify"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes.

**Conditional gate:** This gate applies ONLY to Complex/Epic tasks. If you classified the
work as Trivial or Moderate, close this step immediately with reason
"N/A: Trivial/Moderate task — no PLAN.md required".

For Complex/Epic, run this command:
```bash
if [ -f todos/rapid-increment/PLAN.md ] && grep -qiE "thread checklist" todos/rapid-increment/PLAN.md; then
  echo "GATE 0 PASS: PLAN.md exists with a Thread Checklist"
else
  echo "GATE 0 FAIL: PLAN.md missing or has no Thread Checklist"
fi
```

Then manually confirm: every unresolved thread in `unresolved_threads.md` appears as a
checklist item in PLAN.md (count the threads, count the checkboxes — they must match).

**If FAIL**: Go back to phase-0-classify and enumerate every thread. Do NOT proceed.
**If PASS**: Close this step and continue."""

[[steps]]
id = "phase-1-investigate"
title = "Phase 1: Investigate (adaptive)"
needs = ["gate-0-plan-checklist"]
description = """

Investigate the code each unresolved thread touches, with rigor scaled to the classification.

**Trivial:** Read the file(s) at each thread's `path:line` directly. No investigation phase.

**Moderate:** Read the target files + related tests around each thread. Note the patterns to follow.

**Complex:** Use ONE subagent to investigate:
```
For each unresolved review thread in unresolved_threads.md, read the surrounding code and
report: (1) files to modify, (2) patterns to follow, (3) potential risks, (4) existing test
patterns. Map each finding to the thread it serves.
```

**Epic:** Use TWO parallel subagents, partitioned by area (e.g. data/storage vs API/handlers),
each reporting per-thread: files to modify, patterns, risks, test patterns.

**Anti-stall rule (Complex/Epic):** Investigation is subordinate to implementation. One
subagent pass for Complex, two parallel passes for Epic. If investigation is incomplete after
that, proceed with what you have — compile errors teach faster than a third pass. Do NOT
over-investigate.

**Complex/Epic:** Append the investigation findings (files to modify per thread, patterns,
risks, test patterns) to `todos/rapid-increment/PLAN.md` so they survive a context handoff.

**Out-of-scope discoveries:** If you spot work no comment asked for, record it in
`todos/rapid-increment/out_of_scope.md` — do NOT implement it.

**Exit criteria:** Investigation complete to the depth required by the tier. For
Complex/Epic, findings (mapped to threads) are documented in PLAN.md."""

[[steps]]
id = "gate-1-investigation"
title = "GATE 1: Investigation documented (Complex/Epic only)"
needs = ["phase-1-investigate"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes.

**Conditional gate:** This gate applies ONLY to Complex/Epic tasks. If you classified the
work as Trivial or Moderate, close this step immediately with reason
"N/A: Trivial/Moderate task — no documented investigation required".

For Complex/Epic, run this command:
```bash
if [ -f todos/rapid-increment/PLAN.md ] && grep -qiE "files to modify|patterns to follow|test pattern" todos/rapid-increment/PLAN.md; then
  echo "GATE 1 PASS: investigation findings documented in PLAN.md"
else
  echo "GATE 1 FAIL: investigation findings not documented"
fi
```

**If FAIL**: Go back to phase-1-investigate and record the findings in PLAN.md. Do NOT proceed.
**If PASS**: Close this step and continue."""

[[steps]]
id = "phase-2-test-first"
title = "Phase 2: Test first (write failing tests for behavioral fixes)"
needs = ["gate-1-investigation"]
description = """

For every unresolved thread that asks for a BEHAVIORAL change (one that alters program
behavior), write a failing test BEFORE implementing the fix.

**Which threads need a test:**
- **Behavioral** (bug fix, validation rule, changed output, new guard/branch) → write a test.
- **Non-behavioral** (style, rename, comment wording, docs, formatting, import order) → NO new
  test required; the full suite (Phase 4) provides regression safety.

**Coverage by tier (for the behavioral threads):**
- **Trivial:** Happy path + one error/edge case per behavioral thread.
- **Moderate:** Happy path + all error cases the comment implies + edge cases.
- **Complex/Epic:** Happy path + all error cases + edge cases + integration test.

**Test naming:** Name each test to map to the comment it satisfies (e.g.
`TestWebhookCreateRejectsInvalidURL` for a comment asking to reject invalid URLs). This makes
coverage visible to the reviewer who left the comment.

**Verify the tests FAIL (proves they exercise real new behavior) and SAVE the output:**
```bash
# Discover the project's test command and run ONLY the new tests.
# Save the failing output to test_fail_output.txt — this proves test-first discipline.
# Example (Go): go test ./[path] -run [TestName] -v 2>&1 | tee test_fail_output.txt | tail -10
# Expected: FAIL (compile error or assertion failure)
```

**CRITICAL:** If ANY addressed thread is behavioral, `test_fail_output.txt` MUST exist and show
failure. If ALL addressed threads are purely non-behavioral, no test file is required.

**Exit criteria:** For behavioral threads, failing tests exist AND `test_fail_output.txt` shows
the failure. For a purely non-behavioral set, this step is closed with reason
"N/A: no behavioral comments"."""

[[steps]]
id = "gate-2-failing-test"
title = "GATE 2: Failing test exists for behavioral fixes"
needs = ["phase-2-test-first"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes.

**Conditional on behavior:** If EVERY addressed thread is purely non-behavioral (style, rename,
docs, formatting), close this step with reason "N/A: no behavioral comments". Otherwise the
check below is mandatory.

Run this command:
```bash
if [ -f test_fail_output.txt ] && grep -qiE "fail|error" test_fail_output.txt; then
  echo "GATE 2 PASS: behavioral tests fail before implementation"
else
  echo "GATE 2 FAIL: no failing-test evidence in test_fail_output.txt"
fi
```

**If FAIL**: Either `test_fail_output.txt` is missing, or the tests passed before
implementation (proving nothing). Go back to phase-2-test-first, write meaningful failing
tests for the behavioral threads, and re-save the output. Do NOT proceed.
**If PASS**: Close this step and continue."""

[[steps]]
id = "phase-3-implement"
title = "Phase 3: Implement and disposition each thread"
needs = ["gate-2-failing-test"]
description = """

Address each unresolved thread. Your commits sit ON TOP of the PR head baseline — you never
rewrite the author's history.

**Rules:**
- Follow existing code conventions exactly (naming, error handling, imports)
- Use package-level types for response/request structs, not inline definitions
- Consolidate duplicate error-return paths into helper functions or early returns
- No over-engineering — implement EXACTLY what the comment asks, nothing more
- If a comment is ambiguous, pick the simplest interpretation that satisfies it
- **Spec-literal compliance:** If a comment names a specific type or format (UUID, RFC3339,
  HTTPS URL), implement EXACTLY that. Do NOT substitute custom alternatives (e.g. use
  `uuid.New()` not `generateID("prefix-")`)
- **Standard library validation:** Use stdlib for standard formats — `url.Parse` /
  `url.ParseRequestURI` for URLs, a `uuid` package for UUIDs, `time.Parse` for timestamps.
  NEVER hand-roll prefix checks or regex for standard formats
- **Stay in scope:** Implement ONLY what an unresolved comment asks for. Work you discover but
  no comment requested goes to `todos/rapid-increment/out_of_scope.md` — NEVER the diff.
  (Sole exception: a pre-existing baseline test failure fixed with a "preflight:" commit.)
- **Ship over DNF:** Addressing most comments with passing tests beats addressing none. If time
  is short, address the highest-value comments and reply-defer the rest.

**If a fix's tests fail:** Read the error. Fix the code. Do NOT change the test to match wrong
behavior. If you fail 3 times on the same thread, stop, re-read the comment, and use a subagent
to review: "Review my change against this review comment. What am I missing?"

**Give every thread an explicit disposition.** Write `todos/rapid-increment/thread_dispositions.md`:

| Thread | path:line | Disposition | Evidence / Reason | Resolution note (20 words or less) |
|--------|-----------|-------------|-------------------|------------------------------------|
| 1 | [path:line] | ADDRESSED | [commit/diff hunk that implements the ask] | [draft the note NOW] |
| 2 | [path:line] | DEFERRED | [question only / out of scope / infeasible — reason] | - |

- **ADDRESSED:** the diff contains the change the comment asked for. Draft the resolution note
  now — 20 words or less stating what change was applied.
- **DEFERRED:** no code change made (pure question, out of scope, infeasible). DEFERRED threads
  get a reply at delivery but are NEVER resolved by you — the human decides.
- Every thread in `unresolved_threads.md` MUST have a row.

**Commit your fixes:**
```bash
git add <files>
git commit -m "<type>: <what was addressed> (PR comment)"
```

**Exit criteria:** Each thread addressed or deferred, target tests pass, changes committed, and
`thread_dispositions.md` gives every thread an explicit disposition."""

[[steps]]
id = "gate-3-target-tests"
title = "GATE 3: Target tests pass (ALL tiers)"
needs = ["phase-3-implement"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes.

Run the target tests (the ones written in phase-2-test-first). They MUST now pass:
```bash
# Discover the project's test command and run the target tests.
# Example (Go): go test ./[path] -run [TestName] -v
# Expected: PASS
```

If there were no behavioral threads (no target tests), confirm the non-behavioral changes
compile/build cleanly, then close with reason "N/A: no behavioral comments — build clean".

**If FAIL**: Read the failure. Fix the CODE, not the test. If you have failed 3 times on the
same thread, stop and re-read the comment / use a subagent to review the approach. Do NOT proceed.
**If PASS**: Close this step and continue."""

[[steps]]
id = "phase-4-verify"
title = "Phase 4: Verify and save results"
needs = ["gate-3-target-tests"]
description = """

Run the FULL test suite and SAVE the output — this is a judging artifact.

```bash
# Discover the project's full-suite test command and save output to test_results.txt.
# Example (Go): go test ./... -v 2>&1 | tee test_results.txt
```

**CRITICAL:** `test_results.txt` MUST exist with the full test output. Do NOT skip this.

**Compare to the baseline.** The pass/fail set must be no worse than
`todos/rapid-increment/baseline_tests.log` from preflight. Any test that passed at baseline and
fails now is a regression YOU introduced — fix it. Do NOT skip or delete tests.

**Concurrency fixes:** If a fix uses goroutines, channels, or mutexes (or the language
equivalent), run with the race detector and save that output:
```bash
# Example (Go): go test -race ./[path] -v 2>&1 | tee test_results.txt
```

**Exit criteria:** Full test suite passes (no regressions vs baseline) AND `test_results.txt`
exists with passing output."""

[[steps]]
id = "gate-4-full-suite"
title = "GATE 4: Full suite passes and test_results.txt saved (ALL tiers)"
needs = ["phase-4-verify"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes.

Run this command:
```bash
if [ -f test_results.txt ]; then
  echo "GATE 4: test_results.txt present — confirm it shows the full suite PASSING with no regressions vs baseline_tests.log"
else
  echo "GATE 4 FAIL: test_results.txt missing"
fi
```

Then confirm the saved output shows the full suite passing with no regressions against
`todos/rapid-increment/baseline_tests.log`.

**If FAIL**: `test_results.txt` is missing, or it shows failures/regressions. Go back to
phase-4-verify, fix the regressions, re-run the full suite, and re-save. Do NOT proceed.
**If PASS**: Close this step and continue."""

[[steps]]
id = "gate-5-thread-coverage"
title = "GATE 5: Every thread dispositioned and every change traces to a thread (ALL tiers)"
needs = ["gate-4-full-suite"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes. This gate enforces
the core contract: address the comments, nothing more.

**1. Disposition coverage — every unresolved thread has a disposition:**
Every thread in `todos/rapid-increment/unresolved_threads.md` must have a row in
`todos/rapid-increment/thread_dispositions.md` marked ADDRESSED or DEFERRED. A thread with no
disposition row = GATE 5 FAIL.

**2. Reverse scope audit — every changed file traces to a thread:**
```bash
git diff --name-only $(cat todos/rapid-increment/baseline_sha.txt)...HEAD -- . ':(exclude)todos/'
```
For EACH file listed, it must satisfy at least ONE of:
1. Cited by an ADDRESSED row in `thread_dispositions.md`, OR
2. Changed only by commits with the "preflight:" message prefix (the sanctioned
   pre-existing-test-failure rideralong from preflight-tests):
   `git log --oneline $(cat todos/rapid-increment/baseline_sha.txt)..HEAD -- <file>`

Print a table: file → justification (thread # / preflight / NONE). A file with justification
NONE = GATE 5 FAIL — remove that change or map it to a thread. Items in `out_of_scope.md` are
NEVER a justification for a diff change.

**If FAIL**: Add the missing disposition, or remove/justify the unjustified change, then re-run
this gate. Do NOT proceed.
**If PASS**: Close this step and continue."""

[[steps]]
id = "gate-6-blind-review"
title = "GATE 6: Blind review >= 8/10 (Complex/Epic only)"
needs = ["gate-5-thread-coverage"]
description = """
**MANDATORY GATE CHECK** — Do NOT close this step until the check passes.

**Conditional gate:** This gate applies ONLY to Complex/Epic tasks. If you classified the work
as Trivial or Moderate, close this step immediately with reason
"N/A: Trivial/Moderate task — no blind review required".

For Complex/Epic, use a subagent for a BLIND review of the diff against the unresolved comments
(the subagent must NOT see your investigation or implementation process):
```
Review this diff against the review comments it is meant to address. You have NOT seen the
investigation or implementation process — judge the output on its own merits.

Review comments: [paste the unresolved threads from unresolved_threads.md]
Diff: [paste `git diff $(cat todos/rapid-increment/baseline_sha.txt)...HEAD`]

For each comment, does the diff fully address it? Score 1-10 on:
Correctness, Completeness (every comment addressed), Quality, Risk.
Minimum passing score: 8/10.
```

**If score < 8/10**: Address the feedback, then re-run the blind review. Do NOT proceed until
the score is >= 8/10.
**If score >= 8/10**: Close this step and continue."""

# ============================================================================
# POST-WORK INVARIANT STEPS (+ deliver-to-pr)
# ============================================================================

[[steps]]
id = "self-review"
title = "Self-review changes"
needs = ["gate-6-blind-review"]
description = """
Review your own changes before final testing. All diffs are measured against the PR head
baseline, NOT origin/{{default_branch}}.

**1. Review the diff:**
```bash
BASE=$(cat todos/rapid-increment/baseline_sha.txt)
git diff "$BASE"...HEAD          # All changes vs the PR head
git log --oneline "$BASE"..HEAD  # Your commits on top of the PR
```

**2. Check for common issues:**

| Category | Look For |
|----------|----------|
| Bugs | Off-by-one, null handling, edge cases |
| Security | Injection, auth bypass, exposed secrets |
| Style | Naming, formatting, code organization |
| Completeness | Missing error handling, incomplete paths |
| Cruft | Debug prints, commented code, TODOs |

**3. Fix issues found:**
Don't just note them - fix them now. Amend or add commits as needed.

**4. Verify no unintended changes:**
```bash
git diff --stat "$BASE"...HEAD
# Only files an unresolved comment asked you to touch (or a "preflight:" commit) should appear
```

If you accidentally modified unrelated files, remove those changes.

**Exit criteria:** Changes are clean, reviewed, scoped to the comments, and ready for testing."""

[[steps]]
id = "run-tests"
title = "Run tests and verify coverage"
needs = ["self-review"]
description = """
Verify your changes don't break anything and are properly tested.

**1. Run the full test suite:**
```bash
# Discover the project's test command from CLAUDE.md, Makefile, package.json, etc.
# Then run it. Examples: make test, npm test, cargo test, go test ./...
```

**ALL TESTS MUST PASS** (no regressions vs `todos/rapid-increment/baseline_tests.log`). Do not
proceed with failures.

**2. If tests fail:**
- Read the failure output carefully
- Determine if your change caused it:
  - If yes: Fix it. Return to phase-3-implement step if needed.
  - If it is a pre-existing baseline failure (present in baseline_tests.log): it is the PR's,
    not yours — note it, do not let it block delivery of the comment fixes

**3. Verify test coverage for new code:**
- Behavioral comment fixes should have tests
- If you added significant behavioral code without tests, add them now

**4. Validate terraform if .tf files were modified:**
```bash
BASE=$(cat todos/rapid-increment/baseline_sha.txt)
TF_CHANGED=$(git diff --name-only "$BASE"...HEAD -- '*.tf' | head -1)
if [ -n "$TF_CHANGED" ]; then
  echo "Terraform files modified — running validation..."
  TF_DIR=$(dirname "$TF_CHANGED")
  (cd "$TF_DIR" && terraform validate) || { echo "FAIL: terraform validate failed"; exit 1; }
  terraform fmt -check -recursive "$TF_DIR" || { echo "FAIL: terraform fmt check failed — run 'terraform fmt'"; exit 1; }
  echo "Terraform validation passed."
fi
```

**Exit criteria:** All tests pass (no regressions vs baseline), new behavioral code has appropriate test coverage."""

[[steps]]
id = "self-verify"
title = "Verify implementation matches design contract (if present)"
needs = ["run-tests"]
description = """
Gate: verify implementation matches design contract (Jidoka).

**If a design contract was found in validate-contract:**
- Re-read the design contract from `.designs/pr-<number>/design-doc.md`
- For each requirement/constraint in the contract:
  - Verify the implementation addresses it
  - Check that no constraints are violated
  - Cross-reference with the actual code changes
- Document any deviations with justification

**If NO design contract was found in validate-contract:**
- Close this step with reason "No design contract to verify against"
- Proceed to deliver-to-pr

**Exit criteria:** Implementation verified against design contract (if present), or step closed as N/A."""

[[steps]]
id = "deliver-to-pr"
title = "Deliver: push fixes to the PR branch and resolve addressed threads"
needs = ["self-verify"]
description = """
Land the verified fixes on the ORIGINAL PR branch and mark the threads you addressed as
resolved. The PR's state (Draft / Ready for review), title, body, labels, and reviewers are
left EXACTLY as found.

**Entry criteria:** All gates passed, tests green, thread_dispositions.md exists.

**1. Sync with the live PR head (it may have moved while you worked):**
```bash
git fetch origin <headRefName>
git log HEAD..origin/<headRefName> --oneline
```
- If EMPTY (head unmoved): proceed — your branch is a strict descendant.
- If NOT empty: rebase your work onto the new head and re-verify:
```bash
git rebase origin/<headRefName>
# Re-run the project's test command
```
  If rebase conflicts or tests now fail: fix them. If stuck, mail Supervisor — do NOT
  force-push, do NOT skip tests.

**2. Push the fixes to the PR branch (fast-forward only):**
```bash
git push origin HEAD:<headRefName>
```
- Rejected as non-fast-forward → the head moved again; repeat step 1.
- Permission denied (fork PR without "Allow edits by maintainers"):
```bash
af mail send supervisor -s "ESCALATION: cannot push to PR branch" -m "PR: {{pr_uri}}
Fixes are committed on increment/pr-<number> (pushed to origin as backup).
Push to the PR head branch was denied. Human action needed."
```
  Record DELIVERY_BLOCKED in delivery.md, skip thread resolution (steps 3-4), and continue to
  step 5 — do NOT resolve threads whose fixes did not land.

**3. Reply to and resolve each ADDRESSED thread:**
For each thread marked ADDRESSED in todos/rapid-increment/thread_dispositions.md:

a. Reply with the drafted note (20 words or less, stating what change was applied):
```bash
gh api repos/<owner>/<repo>/pulls/<number>/comments/<top-comment-databaseId>/replies -f body='<resolution note>'
```

b. Resolve the thread (GraphQL — REST cannot resolve threads):
```bash
gh api graphql -F threadId='<thread-node-id>' -f query='
mutation($threadId: ID!) {
  resolveReviewThread(input: {threadId: $threadId}) { thread { isResolved } }
}'
```

For each thread marked DEFERRED: reply with the reason, but do NOT resolve — the human decides those.

**4. Verify resolution state:**
Re-run the unresolved-threads query from load-context. Every ADDRESSED thread must now show
isResolved: true. Retry failures once; if still failing, record the thread in delivery.md and
continue (it goes in the completion mail).

**5. Verify the PR state is unchanged:**
```bash
gh pr view <number> --repo <owner/repo> --json state,isDraft,title
```
Compare to the snapshot in todos/rapid-increment/pr_context.md. `state` and `isDraft` MUST
match the snapshot. You never ran gh pr ready/close/reopen/merge, so a mismatch means it
changed externally: note it in delivery.md, do NOT "restore" it.

**6. Write `todos/rapid-increment/delivery.md`:** pushed sha, threads resolved (with their
notes), threads deferred (with reasons), PR state verification result.

**Exit criteria:** Fixes on the PR branch, every ADDRESSED thread resolved with a note, PR
state untouched, delivery.md written."""

[[steps]]
id = "cleanup-workspace"
title = "Clean up workspace"
needs = ["deliver-to-pr"]
description = """
**Skill artifact cleanup:**
The rapid-increment process creates working files that should NOT be merged.
```bash
rm -f test_results.txt test_fail_output.txt
rm -rf todos/rapid-increment
```

Ensure workspace is pristine before handoff.

**1. Check for uncommitted changes:**
```bash
git status
```
Must show "working tree clean". If not:
- Commit legitimate changes
- Discard garbage: `git checkout -- .`

**2. Check for untracked files:**
```bash
git status --porcelain
```
Should be empty. If not:
- Add to .gitignore if appropriate
- Remove if temporary: `rm <file>`
- Commit if needed

**3. Check stash:**
```bash
git stash list
```
Should be empty. If not:
- Pop and commit: `git stash pop && git add -A && git commit`
- Or drop if garbage: `git stash drop`

**4. Push your work branch (backup — delivery to the PR branch already happened in deliver-to-pr):**
```bash
git push -u origin $(git branch --show-current)
```

**5. Verify nothing left behind:**
```bash
git status                  # Clean
git stash list              # Empty
git log origin/<headRefName>..HEAD   # Should be empty if delivery pushed everything
git diff origin/<headRefName>...HEAD # Should be empty if delivery pushed everything
```

**Exit criteria:** Branch pushed, workspace clean, no cruft (test_results.txt,
test_fail_output.txt, and todos/rapid-increment removed)."""

[[steps]]
id = "prepare-for-review"
title = "Prepare work for review"
needs = ["cleanup-workspace"]
description = """
Record completion on the assignment.

**Note:** Do NOT close the PR and do NOT change its state. The PR belongs to its author — you
only delivered commits and thread resolutions.

**1. Add completion notes to your assigned bead (if dispatched with one):**
```bash
af bead update <bead-id> --notes "Implemented via rapid-increment for {{pr_uri}}.
Classification: <Trivial|Moderate|Complex|Epic>.
Test-first (GATE 2): failing tests proven for behavioral fixes.
GATE 4: full suite passed (test_results.txt verified, no regressions vs baseline).
GATE 5: every thread dispositioned; every change traces to a thread.
Delivery: pushed <sha> to the PR branch (fast-forward, no new PR).
Threads: <X> addressed and resolved (each with a note), <Y> deferred (left unresolved).
Out-of-scope observations (NOT implemented): <Z> — carry out_of_scope.md contents forward in
context; todos/ is already deleted by cleanup-workspace.
PR state preserved: <Draft | Ready for review> as found."
```

If no bead exists (direct dispatch), the WORK_DONE mail from `af done` carries the completion
signal — make sure the delivery numbers above appear in it.

**Exit criteria:** Completion recorded with delivery sha, thread counts, and PR state."""

[[steps]]
id = "submit-and-exit"
title = "Submit and exit"
needs = ["prepare-for-review"]
description = """
Signal completion. The fixes were already delivered by fast-forward push to the ORIGINAL PR
branch and the addressed threads are resolved — there is NO new PR to create.

**1. PR creation: SKIP.**
The pull request already exists and now contains your fix commits. Its state (Draft / Ready for
review), title, body, labels, and reviewers are exactly as you found them.

**2. Complete the formula:**
```bash
af done
```

`af done` closes the current formula step and — since this is the last step — mails WORK_DONE
to the Supervisor and cleans up the checkpoint.

**Ephemeral Agent Model:**
Once you signal completion, you're done. The human will:
1. Re-review the PR with your fixes and resolution notes
2. Triage any DEFERRED threads you left unresolved
3. Merge (or iterate) at their discretion

If you have context remaining, you may:
- Pick up new work from `af prime`
- Or use `af handoff` to cycle to a fresh session

**Exit criteria:** Fixes on the PR branch, threads resolved, Supervisor notified via WORK_DONE, agent done."""

[inputs]
[inputs.pr_uri]
description = "Pull request whose unresolved review comments to address: full GitHub URL (https://github.com/owner/repo/pull/N), owner/repo#N, or bare PR number (current repo)"
type = "string"
required = true
