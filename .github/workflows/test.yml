# CI workflow for agentfactory.
#
# Three jobs run independently on every push and pull request:
#
#   - unit         : `make test` against the unit-test tier. Runs without any
#                    external backend on PATH (the in-memory `memstore` is the
#                    fixture for unit tests; see CLAUDE.md "Test suite
#                    separation").
#   - integration  : `make test-integration` runs the `//go:build integration`
#                    tier. Requires Python 3.12 (the in-tree MCP issue-store
#                    server at `py/issuestore/` is spawned by mcpstore) and
#                    tmux (used by internal/cmd/integration_test.go). The
#                    Makefile builds a venv from py/requirements.txt on demand.
#   - regen        : `make check-regen` regenerates the role templates from the
#                    current formulas (agent-gen-all.sh) and fails if the committed
#                    internal/templates/roles/ diverge — closing six_sigma_gaps Gap 5
#                    (a forgotten regen shipping stale, branch-broken agent identity).
#                    Non-hermetic (needs `af` on PATH); runs on a full checkout, not a
#                    worktree, so it is a dedicated job rather than part of `make test`.
#   - supply-chain-lint : --require-hashes enforcement for all pip install sites.

name: test

on:
  push:
    branches: [main]
    tags: ['V*']
  pull_request:
  workflow_dispatch:

# Supersession control for superseded PR commits — NOT the dedup mechanism.
# Dedup is the push trigger filter above (trigger-schema deletion; see
# .designs/af-85f7458b/design-doc.md "Architecture Elevation Verdict").
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      # Issue #435: this lane's header declares "no external backend on PATH", yet
      # TestWebBridgeHostListenerRoundTrip (internal/cmd/quickdocker_test.go) extracts and
      # runs quickdocker.sh's REAL host-listener ladder, which binds a loopback socket via
      # socat OR python3. Without one of those on PATH the ladder exit 1's binding nothing
      # and the test times out — making the lane's pass/fail depend on incidental runner
      # tooling (the self-hosted pool is heterogeneous). This step GUARANTEES python3 (the
      # ladder's universal fallback, already a de-facto hard dependency per
      # quickdocker.sh:138-139), mirroring the integration job below. This is a deliberate,
      # DECLARED exception to the lane's hermeticity — not contract drift. (The test itself
      # fast-skips when neither tool is present, so a dev machine without python3 is
      # unaffected; in CI this step ensures the round-trip is exercised, never skipped.)
      - name: install python 3.12 (host listener tool for quickdocker.sh round-trip; Issue #435)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: go build
        run: go build ./...
      - name: make test
        run: make test

  web-unit:
    name: web-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      # The web console lives in its OWN Go module (web/go.mod, module
      # github.com/stempeck/agentfactory-web) and is INVISIBLE to the root `unit` job's
      # `go build ./...` / `make test` (a nested go.mod is not covered by the root module's ./...).
      # This job compiles + tests it directly — including the Phase-5 guards
      # TestExtractability_OwnModule_NoInternalImport and TestEntrypoint_WebuiAbsent_NoOp.
      - name: web build
        run: cd web && go build ./...
      - name: web test
        run: cd web && go test ./... -count=1
      # Exercise the installed-artifact path: `make build-webui` runs `cd web && go build
      # -o ../webui ./cmd/afweb`, producing the named `webui` binary the container bootstrap
      # (quickstart.sh install_af) installs to ~/.local/bin/webui. The plain `cd web && go
      # build ./...` step above compiles the module but discards its output, so it never
      # exercises this `-o ../webui` path. (Issue #425 Phase 0 design AC: "make build-webui
      # runs in CI and the produced binary is the one installed (no stale copy).")
      - name: build-webui artifact
        run: make build-webui && test -x webui

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Gap-4 (issue #458): arm mcpstore_test.go's no-silent-skip guard so a missing
    # python3/aiohttp/sqlalchemy HARD-FAILS this gating lane (t.Fatal) instead of
    # silently skipping green — a green skip here would say nothing about the real
    # store, the failure mode #458 calls out. Set ONLY on this job; `unit` and
    # `web-unit` run against memstore and must NOT be affected. Mirrors the unit
    # job's Issue #435 "never silently skipped" guarantee precedent.
    env:
      AF_REQUIRE_REAL_STORE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: install system deps (tmux for internal/cmd/integration_test.go; libsqlite3-0 so the Python issue-store's sqlite3 can load libsqlite3.so.0)
        run: sudo apt-get update && sudo apt-get install -y tmux libsqlite3-0
      # Python 3.12 is required by the in-tree MCP server
      # (py/issuestore/server.py) that mcpstore spawns and by install.go's
      # checkPython312. The Makefile's test-integration target builds a
      # venv from py/requirements.txt; this step only needs to put
      # python3.12 on PATH.
      - name: install python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: make test-integration
        run: make test-integration

  regen:
    name: regen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      # `make check-regen` builds + installs `af`, runs agent-gen-all.sh --no-build to
      # regenerate internal/templates/roles/ from the current formulas, then
      # `git diff --exit-code` fails the job if the committed templates are stale.
      # This is the regeneration half of af-13234830 (Gap 5): formula source edits are
      # only durable if the rendered agent identity is regenerated to match.
      - name: regeneration parity check
        run: make check-regen

  supply-chain-lint:
    name: supply-chain-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify pip installs use --require-hashes
        run: |
          FAILURES=0
          for f in $(grep -rl 'pip.*install' --include='*.sh' . --exclude-dir=.designs --exclude-dir=.agentfactory) Dockerfile Makefile; do
            if [ -f "$f" ] && grep -q 'pip.*install' "$f" && ! grep -q 'require-hashes' "$f"; then
              echo "ERROR: $f has pip install without --require-hashes"
              FAILURES=$((FAILURES + 1))
            fi
          done
          exit $FAILURES
